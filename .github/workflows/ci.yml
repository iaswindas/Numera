name: Numera CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  # ─── Backend (Kotlin/Spring Boot) ─────────────────────────────
  backend-build:
    name: Backend – Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: numera
          POSTGRES_PASSWORD: numera
          POSTGRES_DB: numera
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U numera -d numera"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: valkey/valkey:8.0
        ports: ["6379:6379"]
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/numera
          SPRING_DATASOURCE_USERNAME: numera
          SPRING_DATASOURCE_PASSWORD: numera
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
        run: gradle -p backend build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/

  backend-docker:
    name: Backend – Docker Image
    needs: backend-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        working-directory: backend
        run: gradle bootJar -x test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest

  # ─── Frontend (Next.js) ──────────────────────────────────────
  frontend-build:
    name: Frontend – Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: numera-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: numera-ui/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  frontend-docker:
    name: Frontend – Docker Image
    needs: frontend-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: numera-ui
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest

  # ─── OCR Service (Python/FastAPI) ────────────────────────────
  ocr-service:
    name: OCR Service – Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ocr-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ocr-service/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install ruff pytest pytest-asyncio httpx
      - run: ruff check app/
      - run: pytest tests/ -v --tb=short

  ocr-docker:
    name: OCR Service – Docker Image
    needs: ocr-service
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push OCR image
        uses: docker/build-push-action@v6
        with:
          context: ocr-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ocr-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ocr-service:latest

  # ─── ML Service (Python/FastAPI) ─────────────────────────────
  ml-service:
    name: ML Service – Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install ruff pytest pytest-asyncio httpx
      - run: ruff check app/
      - run: pytest tests/ -v --tb=short

  ml-docker:
    name: ML Service – Docker Image
    needs: ml-service
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ML image
        uses: docker/build-push-action@v6
        with:
          context: ml-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ml-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ml-service:latest

  contract-check:
    name: Contracts - Breaking Change Check
    if: github.event_name == 'pull_request'
    needs: [backend-build, ml-service, ocr-service]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: numera
          POSTGRES_PASSWORD: numera
          POSTGRES_DB: numera
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U numera -d numera"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: valkey/valkey:8.0
        ports: ["6379:6379"]
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python dependencies
        run: |
          pip install -r ml-service/requirements.txt
          pip install -r ocr-service/requirements.txt

      - name: Export candidate contracts
        env:
          NUMERA_OPENAPI_EXPORT_MODE: "true"
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/numera
          SPRING_DATASOURCE_USERNAME: numera
          SPRING_DATASOURCE_PASSWORD: numera
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: "6379"
        run: |
          python scripts/openapi/export_contracts.py --output-dir /tmp/contracts-candidate

      - name: Extract baseline snapshots from base branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          mkdir -p /tmp/contracts-baseline
          git fetch origin "$BASE_REF"
          for service in backend ml-service ocr-service; do
            if git cat-file -e "origin/$BASE_REF:docs/contracts/${service}-openapi.json"; then
              git show "origin/$BASE_REF:docs/contracts/${service}-openapi.json" > "/tmp/contracts-baseline/${service}-openapi.json"
            else
              cp "/tmp/contracts-candidate/${service}-openapi.json" "/tmp/contracts-baseline/${service}-openapi.json"
            fi
          done

      - name: Check contract breaking changes
        run: |
          python scripts/openapi/check_breaking_changes.py \
            --baseline-dir /tmp/contracts-baseline \
            --candidate-dir /tmp/contracts-candidate

  contract-refresh:
    name: Contracts - Refresh Snapshots
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: [backend-build, ml-service, ocr-service]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: numera
          POSTGRES_PASSWORD: numera
          POSTGRES_DB: numera
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U numera -d numera"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: valkey/valkey:8.0
        ports: ["6379:6379"]
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python dependencies
        run: |
          pip install -r ml-service/requirements.txt
          pip install -r ocr-service/requirements.txt

      - name: Export contract snapshots
        env:
          NUMERA_OPENAPI_EXPORT_MODE: "true"
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/numera
          SPRING_DATASOURCE_USERNAME: numera
          SPRING_DATASOURCE_PASSWORD: numera
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: "6379"
        run: |
          python scripts/openapi/export_contracts.py --output-dir docs/contracts

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/contracts
          git diff --cached --quiet || git commit -m "chore: refresh OpenAPI contract snapshots"
          git push
