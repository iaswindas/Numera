apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "numera.labels" (dict "name" "config" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
data:
  # ─── Application ──────────────────────────────────────────────
  APP_NAME: numera
  APP_VERSION: {{ .Chart.AppVersion | quote }}
  LOG_LEVEL: INFO
  # ─── Service Discovery ────────────────────────────────────────
  BACKEND_URL: "http://{{ .Release.Name }}-backend:{{ .Values.backend.service.port }}"
  ML_SERVICE_URL: "http://{{ .Release.Name }}-ml-service:{{ .Values.mlService.service.port }}"
  OCR_SERVICE_URL: "http://{{ .Release.Name }}-ocr-service:{{ .Values.ocrService.service.port }}"
  MLFLOW_URL: "http://{{ .Release.Name }}-mlflow:{{ .Values.mlflow.service.port }}"
  # ─── Data Stores ──────────────────────────────────────────────
  POSTGRES_HOST: "{{ .Release.Name }}-postgresql"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "{{ .Release.Name }}-redis"
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: "{{ .Release.Name }}-minio:{{ .Values.minio.service.apiPort }}"
  RABBITMQ_HOST: "{{ .Release.Name }}-rabbitmq"
  RABBITMQ_PORT: "{{ .Values.rabbitmq.service.amqpPort }}"
