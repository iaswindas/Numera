apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ml-service
  labels:
    {{- include "numera.labels" (dict "name" "ml-service" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
spec:
  replicas: {{ .Values.mlService.replicaCount }}
  selector:
    matchLabels:
      {{- include "numera.selectorLabels" (dict "name" "ml-service" "Release" .Release) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "numera.selectorLabels" (dict "name" "ml-service" "Release" .Release) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: ml-service
          image: "{{ .Values.global.imageRegistry }}{{ .Values.mlService.image.repository }}:{{ .Values.mlService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          env:
            {{- range $key, $val := .Values.mlService.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: ML_PG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: postgres-user
            - name: ML_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: postgres-password
            - name: ML_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: minio-access-key
            - name: ML_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: minio-secret-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mlService.resources | nindent 12 }}
          {{- if .Values.mlService.gpu.enabled }}
          # GPU support via NVIDIA device plugin
          resources:
            {{- toYaml .Values.mlService.resources | nindent 12 }}
            limits:
              nvidia.com/gpu: {{ .Values.mlService.gpu.count }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      {{- if .Values.mlService.gpu.enabled }}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        accelerator: nvidia-gpu
      {{- end }}
