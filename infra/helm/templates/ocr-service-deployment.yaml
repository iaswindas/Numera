apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ocr-service
  labels:
    {{- include "numera.labels" (dict "name" "ocr-service" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
spec:
  replicas: {{ .Values.ocrService.replicaCount }}
  selector:
    matchLabels:
      {{- include "numera.selectorLabels" (dict "name" "ocr-service" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "numera.selectorLabels" (dict "name" "ocr-service" "Release" .Release) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: ocr-service
          image: "{{ .Values.global.imageRegistry }}{{ .Values.ocrService.image.repository }}:{{ .Values.ocrService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            {{- range $key, $val := .Values.ocrService.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: OCR_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: minio-access-key
            - name: OCR_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: minio-secret-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.ocrService.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
