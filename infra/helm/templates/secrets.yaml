apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "numera.labels" (dict "name" "secrets" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
type: Opaque
data:
  postgres-user: {{ .Values.postgresql.env.POSTGRES_USER | b64enc | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  minio-access-key: {{ .Values.secrets.minioAccessKey | b64enc | quote }}
  minio-secret-key: {{ .Values.secrets.minioSecretKey | b64enc | quote }}
  rabbitmq-password: {{ .Values.secrets.rabbitmqPassword | b64enc | quote }}
  {{- if .Values.secrets.redisPassword }}
  redis-password: {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- end }}
