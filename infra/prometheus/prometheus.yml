global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ─── Backend (Spring Boot Actuator / Prometheus) ───────────────
  - job_name: numera-backend
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ["numera-backend:8080"]
        labels:
          service: backend
          component: api

  # ─── ML Service (FastAPI) ──────────────────────────────────────
  - job_name: numera-ml-service
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["numera-ml-service:8002"]
        labels:
          service: ml-service
          component: ml

  # ─── OCR Service (FastAPI) ─────────────────────────────────────
  - job_name: numera-ocr-service
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["numera-ocr-service:8001"]
        labels:
          service: ocr-service
          component: ocr

  # ─── PostgreSQL Exporter ───────────────────────────────────────
  - job_name: postgresql
    scrape_interval: 30s
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgresql

  # ─── Redis Exporter ────────────────────────────────────────────
  - job_name: redis
    scrape_interval: 15s
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  # ─── RabbitMQ ──────────────────────────────────────────────────
  - job_name: rabbitmq
    scrape_interval: 15s
    static_configs:
      - targets: ["numera-rabbitmq:15692"]
        labels:
          service: rabbitmq

  # ─── MinIO ─────────────────────────────────────────────────────
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    scrape_interval: 30s
    static_configs:
      - targets: ["numera-minio:9000"]
        labels:
          service: minio

  # ─── MLflow ────────────────────────────────────────────────────
  - job_name: mlflow
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ["numera-mlflow:5000"]
        labels:
          service: mlflow

  # ─── Node Exporter (host metrics) ─────────────────────────────
  - job_name: node
    scrape_interval: 30s
    static_configs:
      - targets: ["node-exporter:9100"]
